<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <title>Abao Ambience — trains.popped.dev</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }
      .fullscreen {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        min-height: 100vh;
        min-height: 100dvh;
        min-height: -webkit-fill-available;
      }
      #yt-player {
        width: 100%;
        height: 100%;
        border: 0;
      }
    </style>
  </head>
  <body>
    <div class="fullscreen">
      <div id="yt-player" title="Abao Ambience video"></div>
    </div>
    <script>
      (function () {
        var STATE_KEY = "trains.popped.dev:player-v1";
        var LEGACY_TIME_KEY = "trains.popped.dev:yt:q8nPaqfRm_c";
        /** If /api/random-video is unavailable, play this Abao Ambience video (must stay public). */
        var FALLBACK_VIDEO_ID = "c0StuzQvdTg";
        var SAVE_EVERY_MS = 4000;
        var player = null;
        var saveTimer = null;
        var START_VIDEO_ID = "";
        var RESUME_T = null;

        function isValidVideoId(id) {
          return (
            typeof id === "string" && /^[a-zA-Z0-9_-]{11}$/.test(id)
          );
        }

        function readState() {
          try {
            var raw = localStorage.getItem(STATE_KEY);
            if (raw) {
              var o = JSON.parse(raw);
              if (
                o &&
                typeof o.v === "string" &&
                typeof o.t === "number" &&
                isValidVideoId(o.v)
              ) {
                return { v: o.v, t: o.t };
              }
            }
          } catch (e) {}
          try {
            var leg = localStorage.getItem(LEGACY_TIME_KEY);
            if (leg) {
              var t0 = parseFloat(leg, 10);
              if (isFinite(t0) && t0 >= 0.5) {
                localStorage.removeItem(LEGACY_TIME_KEY);
                return { v: "q8nPaqfRm_c", t: t0 };
              }
            }
          } catch (e) {}
          return null;
        }
        function writeState(v, t) {
          try {
            localStorage.setItem(STATE_KEY, JSON.stringify({ v: v, t: t }));
          } catch (e) {}
        }
        function clearState() {
          try {
            localStorage.removeItem(STATE_KEY);
            localStorage.removeItem(LEGACY_TIME_KEY);
          } catch (e) {}
        }

        function fetchRandomFromApi(exclude) {
          var q =
            exclude && isValidVideoId(exclude)
              ? "?exclude=" + encodeURIComponent(exclude)
              : "";
          return fetch("/api/random-video" + q)
            .then(function (r) {
              if (!r.ok) throw new Error("bad");
              return r.json();
            })
            .then(function (d) {
              if (!d || !isValidVideoId(d.videoId)) throw new Error("no id");
              return d.videoId;
            })
            .catch(function () {
              return FALLBACK_VIDEO_ID;
            });
        }

        function resolveStart() {
          var s = readState();
          if (s && s.t >= 0.5 && isValidVideoId(s.v)) {
            START_VIDEO_ID = s.v;
            RESUME_T = s.t;
            return Promise.resolve();
          }
          if (s) clearState();
          return fetchRandomFromApi().then(function (randomId) {
            START_VIDEO_ID = randomId;
            RESUME_T = null;
          });
        }

        function getVideoId() {
          if (!player || typeof player.getVideoData !== "function")
            return null;
          var vd = player.getVideoData();
          return vd && vd.video_id ? vd.video_id : null;
        }

        function persistPosition() {
          if (!player || typeof player.getCurrentTime !== "function") return;
          var t = player.getCurrentTime();
          var d = player.getDuration();
          var vid = getVideoId();
          if (!vid || !isValidVideoId(vid)) return;
          if (typeof t !== "number" || t < 0.5) return;
          if (typeof d === "number" && d > 0 && t >= d - 2) {
            clearState();
            return;
          }
          writeState(vid, t);
        }

        function wireAutoSave() {
          if (saveTimer) return;
          saveTimer = setInterval(persistPosition, SAVE_EVERY_MS);
          document.addEventListener("visibilitychange", function () {
            if (document.visibilityState === "hidden") persistPosition();
          });
          window.addEventListener("pagehide", persistPosition);
        }

        function tryRestore(attempt) {
          if (RESUME_T == null) {
            wireAutoSave();
            return;
          }
          var t = RESUME_T;
          if (!isFinite(t) || t < 0.5) {
            clearState();
            wireAutoSave();
            return;
          }
          var d = player.getDuration();
          if (d > 0) {
            if (t < d - 1) {
              player.seekTo(t, true);
            } else {
              clearState();
            }
            wireAutoSave();
            return;
          }
          if (attempt < 30) {
            setTimeout(function () {
              tryRestore(attempt + 1);
            }, 100);
          } else {
            wireAutoSave();
          }
        }

        function playNextAfterEnd() {
          clearState();
          var cur = getVideoId();
          fetchRandomFromApi(cur).then(function (next) {
            if (next && player && typeof player.loadVideoById === "function") {
              player.loadVideoById({ videoId: next });
            }
          });
        }

        function bootPlayer() {
          window.onYouTubeIframeAPIReady = function () {
            player = new YT.Player("yt-player", {
              width: "100%",
              height: "100%",
              videoId: START_VIDEO_ID,
              playerVars: { rel: 0, enablejsapi: 1 },
              events: {
                onReady: function () {
                  tryRestore(0);
                },
                onStateChange: function (e) {
                  if (e.data === YT.PlayerState.ENDED) {
                    playNextAfterEnd();
                  } else if (e.data === YT.PlayerState.PAUSED) {
                    persistPosition();
                  }
                },
              },
            });
          };
          var s = document.createElement("script");
          s.async = true;
          s.src = "https://www.youtube.com/iframe_api";
          document.body.appendChild(s);
        }

        resolveStart().then(bootPlayer);
      })();
    </script>
  </body>
</html>
