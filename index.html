<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <title>Japanese train — trains.popped.dev</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }
      .fullscreen {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        min-height: 100vh;
        min-height: 100dvh;
        min-height: -webkit-fill-available;
      }
      #yt-player {
        width: 100%;
        height: 100%;
        border: 0;
      }
    </style>
  </head>
  <body>
    <div class="fullscreen">
      <div id="yt-player" title="Japanese train video"></div>
    </div>
    <script>
      (function () {
        var VIDEO_ID = "q8nPaqfRm_c";
        var STORAGE_KEY = "trains.popped.dev:yt:" + VIDEO_ID;
        var SAVE_EVERY_MS = 4000;
        var player = null;
        var saveTimer = null;

        function storageGet() {
          try {
            return localStorage.getItem(STORAGE_KEY);
          } catch (e) {
            return null;
          }
        }
        function storageSet(s) {
          try {
            localStorage.setItem(STORAGE_KEY, s);
          } catch (e) {}
        }
        function storageRemove() {
          try {
            localStorage.removeItem(STORAGE_KEY);
          } catch (e) {}
        }

        function persistPosition() {
          if (!player || typeof player.getCurrentTime !== "function") return;
          var t = player.getCurrentTime();
          var d = player.getDuration();
          if (typeof t !== "number" || t < 0.5) return;
          if (typeof d === "number" && d > 0 && t >= d - 2) {
            storageRemove();
            return;
          }
          storageSet(String(t));
        }

        function wireAutoSave() {
          if (saveTimer) return;
          saveTimer = setInterval(persistPosition, SAVE_EVERY_MS);
          document.addEventListener("visibilitychange", function () {
            if (document.visibilityState === "hidden") persistPosition();
          });
          window.addEventListener("pagehide", persistPosition);
        }

        function tryRestore(attempt) {
          var raw = storageGet();
          if (raw == null) {
            wireAutoSave();
            return;
          }
          var t = parseFloat(raw, 10);
          if (!isFinite(t) || t < 0.5) {
            storageRemove();
            wireAutoSave();
            return;
          }
          var d = player.getDuration();
          if (d > 0) {
            if (t < d - 1) {
              player.seekTo(t, true);
            } else {
              storageRemove();
            }
            wireAutoSave();
            return;
          }
          if (attempt < 30) {
            setTimeout(function () {
              tryRestore(attempt + 1);
            }, 100);
          } else {
            wireAutoSave();
          }
        }

        window.onYouTubeIframeAPIReady = function () {
          player = new YT.Player("yt-player", {
            width: "100%",
            height: "100%",
            videoId: VIDEO_ID,
            playerVars: { rel: 0, enablejsapi: 1 },
            events: {
              onReady: function () {
                tryRestore(0);
              },
              onStateChange: function (e) {
                if (e.data === YT.PlayerState.ENDED) {
                  storageRemove();
                } else if (e.data === YT.PlayerState.PAUSED) {
                  persistPosition();
                }
              },
            },
          });
        };
      })();
    </script>
    <script async src="https://www.youtube.com/iframe_api"></script>
  </body>
</html>
